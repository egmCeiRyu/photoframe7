<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>AR Photo Frame Universal</title>

<script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
<script src="https://unpkg.com/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:sans-serif;
}

#app,#ar-container{
position:fixed;
inset:0;
width:100%;
height:100%;
}

#loading{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
color:#fff;
z-index:100;
font-size:18px;
text-align:center;
padding:20px;
}

#title{
position:fixed;
top:12px;
left:0;
width:100%;
text-align:center;
color:#fff;
font-size:20px;
font-weight:bold;
z-index:30;
text-shadow:0 2px 8px rgba(0,0,0,.7);
}

#guide{
position:fixed;
top:42px;
left:0;
width:100%;
text-align:center;
color:#fff;
font-size:14px;
z-index:30;
text-shadow:0 2px 8px rgba(0,0,0,.7);
}

#captureBtn{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
z-index:30;
border:none;
border-radius:16px;
padding:16px 34px;
font-size:20px;
font-weight:bold;
background:#ff5ca9;
color:#fff;
display:none;
}

video{
object-fit:cover;
}
</style>
</head>

<body>

<div id="app">
<div id="ar-container"></div>
<div id="loading">Opening Camera...</div>
<div id="title">AR Photo Frame</div>
<div id="guide">マーカーをカメラに映してください</div>
<button id="captureBtn">📸 撮影</button>
</div>

<script>
let renderer, scene, camera, mindarThree;
let detectedIndex = -1;

const frames = [
"./samurai-frame1.png",
"./ninja-frame2.png",
"./idol-frame3.png",
"./mecha-frame4.png",
"./kitsune-frame5.png",
"./dragon-frame6.png",
"./water-frame7.png"
];

window.addEventListener("load", startScanner);

async function startScanner(){

try{

mindarThree = new window.MINDAR.IMAGE.MindARThree({
container: document.querySelector("#ar-container"),
imageTargetSrc:"./targets.mind",
uiScanning:false,
uiLoading:false,
uiError:false
});

renderer = mindarThree.renderer;
scene = mindarThree.scene;
camera = mindarThree.camera;

renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.preserveDrawingBuffer = true;

const light = new THREE.HemisphereLight(0xffffff,0xbbbbff,1.2);
scene.add(light);

for(let i=0;i<7;i++){

const anchor = mindarThree.addAnchor(i);

anchor.onTargetFound = ()=>{
detectedIndex = i;
switchToSelfie(i);
};

}

await mindarThree.start();

document.getElementById("loading").style.display="none";

renderer.setAnimationLoop(()=>{
renderer.render(scene,camera);
});

}catch(err){
document.getElementById("loading").innerHTML="Failed: "+err.message;
console.error(err);
}
}

async function switchToSelfie(index){

document.getElementById("loading").style.display="flex";
document.getElementById("loading").innerHTML="Opening Selfie Camera...";

try{

if(mindarThree) await mindarThree.stop();

document.querySelector("#ar-container").innerHTML="";

const stream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"user",
width:{ideal:1280},
height:{ideal:720}
},
audio:false
});

const video = document.createElement("video");
video.autoplay = true;
video.muted = true;
video.playsInline = true;
video.srcObject = stream;
video.style.position = "fixed";
video.style.inset = "0";
video.style.width = "100%";
video.style.height = "100%";
video.style.objectFit = "cover";
video.id = "selfieVideo";

document.querySelector("#ar-container").appendChild(video);

await video.play();

const overlay = document.createElement("img");
overlay.src = frames[index];
overlay.id = "frameOverlay";
overlay.style.position = "fixed";
overlay.style.inset = "0";
overlay.style.width = "100%";
overlay.style.height = "100%";
overlay.style.objectFit = "cover";
overlay.style.pointerEvents = "none";

document.querySelector("#ar-container").appendChild(overlay);

document.getElementById("captureBtn").style.display="block";
document.getElementById("guide").innerHTML="Selfie Mode";
document.getElementById("loading").style.display="none";

}catch(err){
document.getElementById("loading").innerHTML="Selfie error";
console.error(err);
}
}

document.getElementById("captureBtn").addEventListener("click",()=>{

const video = document.getElementById("selfieVideo");
const frame = document.getElementById("frameOverlay");

if(!video) return;

const canvas = document.createElement("canvas");
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");

ctx.drawImage(video,0,0,canvas.width,canvas.height);

if(frame){
ctx.drawImage(frame,0,0,canvas.width,canvas.height);
}

const link = document.createElement("a");
link.download = "AR-Photo-"+Date.now()+".jpg";
link.href = canvas.toDataURL("image/jpeg",0.95);
link.click();

});

window.addEventListener("resize",()=>{
if(renderer){
renderer.setSize(innerWidth,innerHeight);
}
});
</script>

</body>
</html>
