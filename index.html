<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>AR Photo Frame Universal Stable</title>

<script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
<script src="https://unpkg.com/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:sans-serif;
}

#ar-container{
position:fixed;
inset:0;
width:100%;
height:100%;
}

#ui{
position:fixed;
inset:0;
z-index:50;
pointer-events:none;
}

#title{
position:absolute;
top:14px;
left:0;
width:100%;
text-align:center;
color:#fff;
font-size:22px;
font-weight:bold;
text-shadow:0 2px 8px rgba(0,0,0,.7);
}

#status{
position:absolute;
top:48px;
left:0;
width:100%;
text-align:center;
color:#fff;
font-size:14px;
text-shadow:0 2px 8px rgba(0,0,0,.7);
padding:0 10px;
box-sizing:border-box;
}

#controls{
position:absolute;
left:0;
right:0;
bottom:24px;
display:flex;
justify-content:center;
gap:12px;
pointer-events:auto;
}

button{
border:none;
border-radius:16px;
padding:14px 22px;
font-size:18px;
font-weight:bold;
color:#fff;
background:#ff5ca9;
}

#captureBtn{
display:none;
}

#flash{
position:fixed;
inset:0;
background:#fff;
opacity:0;
pointer-events:none;
z-index:100;
}
</style>
</head>

<body>

<div id="ar-container"></div>

<div id="ui">
<div id="title">AR Photo Frame</div>
<div id="status">Tap START CAMERA</div>

<div id="controls">
<button id="startBtn">START CAMERA</button>
<button id="captureBtn">📸 PHOTO</button>
</div>
</div>

<div id="flash"></div>

<script>
let renderer, scene, camera, mindarThree;
let currentStream = null;
let selfieVideo = null;
let frameImg = null;
let scanning = false;

const frames = [
"./samurai-frame1.png",
"./ninja-frame2.png",
"./idol-frame3.png",
"./mecha-frame4.png",
"./kitsune-frame5.png",
"./dragon-frame6.png",
"./water-frame7.png"
];

const statusEl = document.getElementById("status");
const startBtn = document.getElementById("startBtn");
const captureBtn = document.getElementById("captureBtn");
const container = document.getElementById("ar-container");

startBtn.addEventListener("click", startScanner);
captureBtn.addEventListener("click", takePhoto);

function setStatus(txt){
statusEl.innerHTML = txt;
}

async function stopCurrentStream(){
if(currentStream){
currentStream.getTracks().forEach(t=>t.stop());
currentStream = null;
}
}

async function startScanner(){

if(scanning) return;
scanning = true;

startBtn.style.display = "none";
captureBtn.style.display = "none";
container.innerHTML = "";

setStatus("Opening rear camera...");

try{

mindarThree = new window.MINDAR.IMAGE.MindARThree({
container: container,
imageTargetSrc:"./targets.mind",
uiScanning:false,
uiLoading:false,
uiError:false
});

renderer = mindarThree.renderer;
scene = mindarThree.scene;
camera = mindarThree.camera;

renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.preserveDrawingBuffer = true;

const light = new THREE.HemisphereLight(0xffffff,0xbbbbff,1.2);
scene.add(light);

for(let i=0;i<7;i++){

const anchor = mindarThree.addAnchor(i);

anchor.onTargetFound = ()=>{
switchToSelfie(i);
};

}

await mindarThree.start();

setStatus("Point camera to marker");

renderer.setAnimationLoop(()=>{
renderer.render(scene,camera);
});

}catch(err){

console.error(err);
setStatus("Camera error. Check permission / HTTPS");
startBtn.style.display = "inline-block";
scanning = false;
}
}

async function switchToSelfie(index){

setStatus("Opening selfie camera...");

try{

if(mindarThree){
await mindarThree.stop();
}

container.innerHTML = "";

await stopCurrentStream();

currentStream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:{ideal:"user"},
width:{ideal:1280},
height:{ideal:720}
},
audio:false
});

selfieVideo = document.createElement("video");
selfieVideo.autoplay = true;
selfieVideo.muted = true;
selfieVideo.playsInline = true;
selfieVideo.srcObject = currentStream;
selfieVideo.style.position = "fixed";
selfieVideo.style.inset = "0";
selfieVideo.style.width = "100%";
selfieVideo.style.height = "100%";
selfieVideo.style.objectFit = "cover";

container.appendChild(selfieVideo);

await selfieVideo.play();

frameImg = document.createElement("img");
frameImg.src = frames[index];
frameImg.style.position = "fixed";
frameImg.style.inset = "0";
frameImg.style.width = "100%";
frameImg.style.height = "100%";
frameImg.style.objectFit = "cover";
frameImg.style.pointerEvents = "none";

container.appendChild(frameImg);

captureBtn.style.display = "inline-block";
setStatus("Selfie mode ready");

}catch(err){

console.error(err);
setStatus("Selfie camera failed");
startBtn.style.display = "inline-block";
}
}

function flashEffect(){

const flash = document.getElementById("flash");

flash.style.transition = "none";
flash.style.opacity = "0.95";

setTimeout(()=>{
flash.style.transition = "opacity .35s ease";
flash.style.opacity = "0";
},40);
}

function takePhoto(){

if(!selfieVideo) return;

flashEffect();

const canvas = document.createElement("canvas");
canvas.width = selfieVideo.videoWidth || 1280;
canvas.height = selfieVideo.videoHeight || 720;

const ctx = canvas.getContext("2d");

ctx.drawImage(selfieVideo,0,0,canvas.width,canvas.height);

if(frameImg){
ctx.drawImage(frameImg,0,0,canvas.width,canvas.height);
}

const link = document.createElement("a");
link.download = "AR-Photo-"+Date.now()+".jpg";
link.href = canvas.toDataURL("image/jpeg",0.95);
link.click();
}

window.addEventListener("resize",()=>{
if(renderer){
renderer.setSize(window.innerWidth,window.innerHeight);
}
});
</script>

</body>
</html>
