<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>AR Photo Frame Booth</title>
<script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
<script src="https://unpkg.com/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>
<style>
html,body{
margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
#ar-container{
position:fixed;inset:0;background:#000;
}
#home{
position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:18px;padding:24px;background:#000;z-index:60;
}
#homeTitle{
color:#fff;font-size:30px;font-weight:700;text-align:center;
}
#homeSub{
color:#fff;font-size:15px;text-align:center;line-height:1.45;max-width:320px;opacity:.92;
}
#captureBtn{
border:none;border-radius:18px;padding:16px 28px;font-size:20px;font-weight:700;background:#ff5ca9;color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.25);
}
#captureBtn{
position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:80;
}
#title{
position:fixed;top:12px;left:0;width:100%;text-align:center;color:#fff;font-size:22px;font-weight:700;z-index:30;text-shadow:0 2px 8px rgba(0,0,0,.7);pointer-events:none;
}
#status{
position:fixed;top:46px;left:0;width:100%;text-align:center;color:#fff;font-size:14px;z-index:30;text-shadow:0 2px 8px rgba(0,0,0,.7);padding:0 12px;box-sizing:border-box;pointer-events:none;
}
#flash{
position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:100;
}
</style>
</head>
<body>
<div id="ar-container"></div>
<div id="title">ARフォトフレーム</div>
<div id="status">準備完了</div>

<div id="home">
  <div id="homeTitle">ARフォトフレーム</div>
  <div id="homeSub">下のボタンを押してARマーカーをスキャンしてください。</div>
  <button id="scanBtn">ARマーカーをスキャン</button>
</div>

<button id="captureBtn">📸 撮影</button>
<div id="flash"></div>

<input type="file" id="nativeCamera" accept="image/*" capture="user" style="display:none">

<script>
/* ---------- CONFIG ---------- */
const DATA = [
  {frame:"./samurai-frame1.png", name:"Samurai"},
  {frame:"./ninja-frame2.png", name:"Shadow-Ninja"},
  {frame:"./idol-frame3.png", name:"Sakura-Idol"},
  {frame:"./mecha-frame4.png", name:"Mecha-Bot"},
  {frame:"./kitsune-frame5.png", name:"Kitsune-Spirit"},
  {frame:"./dragon-frame6.png", name:"Dragon-Knight"},
  {frame:"./water-frame7.png", name:"Water-Mage"}
];
const TARGETS_FILE = "./targets.mind";

/* ---------------------------- */
const container = document.getElementById("ar-container");
const statusEl = document.getElementById("status");
const home = document.getElementById("home");
const scanBtn = document.getElementById("scanBtn");
const captureBtn = document.getElementById("captureBtn");
const nativeCameraInput = document.getElementById("nativeCamera");

let mode = "home";
let currentIndex = -1;
let mindarThree = null;
let renderer = null;
let scene = null;
let camera = null;
let frameBitmap = null;

scanBtn.addEventListener("click", startScanner);
captureBtn.addEventListener("click", () => nativeCameraInput.click());
nativeCameraInput.addEventListener("change", handleNativePhoto);

/* ---------- HELPERS ---------- */
function setStatus(t){ statusEl.textContent = t; }

function showHome(){
  home.style.display = "flex";
  captureBtn.style.display = "none";
  mode = "home";
  setStatus("準備完了");
}

function hideHome(){ home.style.display = "none"; }

function flash(){
  const el = document.getElementById("flash");
  el.style.transition = "none";
  el.style.opacity = "0.95";
  setTimeout(()=>{ el.style.transition = "opacity .35s ease"; el.style.opacity = "0"; },40);
}

function safeName(name){ return name.replace(/[^\w\-]/g,""); }

function downloadFile(dataUrl, fileName){
  const a = document.createElement("a");
  a.href = dataUrl;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

async function loadFrameWithTransparency(src){
  const response = await fetch(src);
  const blob = await response.blob();
  return await createImageBitmap(blob);
}

/* ---------- SCANNER (mantido igual) ---------- */
async function startScanner(){
  hideHome();
  mode = "scanner";
  currentIndex = -1;
  // ... (o resto do código do scanner fica igual ao seu original)
  // Copie aqui o conteúdo completo da função startScanner() do seu código anterior
  // (incluindo mindarThree, anchors, openSelfie, etc.)
  // Por brevidade, não repeti tudo aqui. Mantenha exatamente como estava.
}

/* ---------- NOVA FUNÇÃO: Foto com câmera nativa ---------- */
async function handleNativePhoto(e){
  const file = e.target.files[0];
  if (!file || currentIndex === -1) {
    setStatus("Erro ao capturar foto");
    showHome();
    return;
  }

  flash();
  captureBtn.disabled = true;

  try {
    const img = new Image();
    img.src = URL.createObjectURL(file);
    
    await new Promise(resolve => img.onload = resolve);

    const w = img.width;
    const h = img.height;

    const canvas = document.createElement("canvas");
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext("2d");

    ctx.drawImage(img, 0, 0, w, h);

    // Carrega e aplica o frame
    if (!frameBitmap) {
      frameBitmap = await loadFrameWithTransparency(DATA[currentIndex].frame);
    }
    ctx.drawImage(frameBitmap, 0, 0, w, h);

    const dataUrl = canvas.toDataURL("image/jpeg", 0.95);
    const fileName = safeName(DATA[currentIndex].name) + ".jpg";

    downloadFile(dataUrl, fileName);

    setStatus("📸 Foto salva na pasta Downloads!\n\nAbra Downloads → toque na foto → Compartilhar → Salvar na Biblioteca de Fotos");

  } catch (err) {
    console.error(err);
    setStatus("Falha ao processar a foto");
  }

  setTimeout(() => {
    captureBtn.disabled = false;
    nativeCameraInput.value = ""; // limpa o input
    showHome();
  }, 1500);
}

/* ---------- Limpeza (simplificada) ---------- */
function cleanup(){
  if (mindarThree) mindarThree.stop().catch(()=>{});
  mindarThree = null;
}

/* ---------- Resize ---------- */
window.addEventListener("resize", () => {
  if (renderer) renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
