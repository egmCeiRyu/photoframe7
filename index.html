<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>ARフォトフレーム</title>
<script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
<script src="https://unpkg.com/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>
<style>
:root {
  --pink: #ff2e9a;
  --purple: #9b4dff;
  --neon: #00f5ff;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #0a0a0a;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: white;
}

#ar-container {
  position: fixed;
  inset: 0;
  background: #000;
}

#title {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 2px;
  background: linear-gradient(90deg, var(--pink), var(--neon));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  z-index: 50;
  text-shadow: 0 0 20px rgba(255, 46, 154, 0.5);
}

#status {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  font-size: 15px;
  line-height: 1.5;
  z-index: 50;
  text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  white-space: pre-line;
}

/* Home Screen - Modern Design */
#home {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 24px;
  background: radial-gradient(circle at center, rgba(155,77,255,0.15), transparent 70%);
  z-index: 60;
}

#homeTitle {
  font-size: 42px;
  font-weight: 800;
  background: linear-gradient(90deg, #ff2e9a, #9b4dff, #00f5ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
  letter-spacing: 3px;
}

#homeSub {
  font-size: 16px;
  max-width: 280px;
  text-align: center;
  opacity: 0.85;
  line-height: 1.6;
}

/* Botões Modernos */
button {
  border: none;
  border-radius: 50px;
  padding: 16px 40px;
  font-size: 19px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

#scanBtn {
  background: linear-gradient(45deg, var(--pink), var(--purple));
  color: white;
}

#scanBtn:active {
  transform: scale(0.95);
  box-shadow: 0 5px 15px rgba(255,46,154,0.6);
}

#captureBtn {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: white;
  color: #000;
  font-size: 36px;
  display: none;
  z-index: 80;
  box-shadow: 0 0 40px rgba(255,46,154,0.8);
  border: 6px solid #fff;
}

#captureBtn:active {
  transform: translateX(-50%) scale(0.9);
}

#returnBtn {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  color: white;
  padding: 14px 32px;
  font-size: 16px;
  border: 1px solid rgba(255,255,255,0.3);
  display: none;
  z-index: 85;
}

#returnBtn:active {
  background: rgba(255,255,255,0.3);
}

/* Flash Effect */
#flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  z-index: 100;
  transition: opacity 0.25s ease;
}
</style>
</head>
<body>
<div id="ar-container"></div>
<div id="title">AR PHOTO BOOTH</div>
<div id="status">準備完了</div>

<div id="home">
  <div id="homeTitle">ARフォトフレーム</div>
  <div id="homeSub">マーカーをスキャンして<br>特別な写真を撮ろう</div>
  <button id="scanBtn">ARマーカーをスキャン</button>
</div>

<button id="captureBtn">📸</button>
<button id="returnBtn">← もう一度スキャンする</button>
<div id="flash"></div>

<script>
/* ---------- CONFIG ---------- */
const DATA = [
  {frame:"./samurai-frame1.png", name:"Samurai"},
  {frame:"./ninja-frame2.png", name:"Shadow-Ninja"},
  {frame:"./idol-frame3.png", name:"Sakura-Idol"},
  {frame:"./mecha-frame4.png", name:"Mecha-Bot"},
  {frame:"./kitsune-frame5.png", name:"Kitsune-Spirit"},
  {frame:"./dragon-frame6.png", name:"Dragon-Knight"},
  {frame:"./water-frame7.png", name:"Water-Mage"}
];
const TARGETS_FILE = "./targets.mind";

/* ---------------------------- */
const container = document.getElementById("ar-container");
const statusEl = document.getElementById("status");
const home = document.getElementById("home");
const scanBtn = document.getElementById("scanBtn");
const captureBtn = document.getElementById("captureBtn");
const returnBtn = document.getElementById("returnBtn");

let mode = "home";
let busy = false;
let currentIndex = -1;
let mindarThree = null;
let renderer = null;
let scene = null;
let camera = null;
let selfieStream = null;
let selfieVideo = null;
let frameOverlay = null;
let frameBitmap = null;

scanBtn.addEventListener("click", startScanner);
captureBtn.addEventListener("click", takePhoto);
returnBtn.addEventListener("click", returnToScan);

/* ---------- HELPERS ---------- */
function setStatus(t){ statusEl.textContent = t; }

function showHome(){
  home.style.display = "flex";
  captureBtn.style.display = "none";
  returnBtn.style.display = "none";
  mode = "home";
  setStatus("準備完了");
}

function hideHome(){ home.style.display = "none"; }

function flash(){
  const el = document.getElementById("flash");
  el.style.transition = "none";
  el.style.opacity = "0.85";
  setTimeout(() => {
    el.style.transition = "opacity 0.4s ease";
    el.style.opacity = "0";
  }, 50);
}

function clearContainer(){ container.innerHTML = ""; }

async function stopTracks(stream){
  if(stream) stream.getTracks().forEach(t => t.stop());
}

function safeName(name){ return name.replace(/[^\w\-]/g, ""); }

function downloadFile(dataUrl, fileName){
  const a = document.createElement("a");
  a.href = dataUrl;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

async function loadFrameWithTransparency(src){
  const response = await fetch(src);
  const blob = await response.blob();
  return await createImageBitmap(blob);
}

/* ---------- SCANNER ---------- */
async function startScanner(){
  hideHome();
  mode = "scanner";
  busy = false;
  currentIndex = -1;
  await cleanupSelfie();
  await cleanupScanner();
  clearContainer();

  try{
    setStatus("背面カメラを起動しています...");
    mindarThree = new window.MINDAR.IMAGE.MindARThree({
      container: container,
      imageTargetSrc: TARGETS_FILE,
      uiScanning: false,
      uiLoading: false,
      uiError: false,
      maxTrack: 1
    });

    renderer = mindarThree.renderer;
    scene = mindarThree.scene;
    camera = mindarThree.camera;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1.1));

    for(let i = 0; i < 7; i++){
      const anchor = mindarThree.addAnchor(i);
      anchor.onTargetFound = () => {
        if(mode !== "scanner" || busy) return;
        busy = true;
        currentIndex = i;
        setTimeout(() => openSelfie(i), 250);
      };
    }

    await mindarThree.start();
    renderer.setAnimationLoop(() => renderer.render(scene, camera));
    setStatus("ARマーカーをカメラに映してください");
  }catch(err){
    console.error(err);
    setStatus("カメラを起動できませんでした");
    showHome();
  }
}

async function cleanupScanner(){
  try{ if(mindarThree) await mindarThree.stop(); }catch(e){}
  try{ if(renderer) renderer.setAnimationLoop(null); }catch(e){}
  mindarThree = renderer = scene = camera = null;
}

/* ---------- SELFIE ---------- */
async function openSelfie(index){
  mode = "selfie";
  await cleanupScanner();
  clearContainer();

  try{
    setStatus("前面カメラを起動しています...");
    selfieStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "user" }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });

    selfieVideo = document.createElement("video");
    selfieVideo.autoplay = true;
    selfieVideo.muted = true;
    selfieVideo.playsInline = true;
    selfieVideo.srcObject = selfieStream;
    Object.assign(selfieVideo.style, {
      position:"fixed", top:"0", left:"0", width:"100vw", height:"100dvh", objectFit:"cover"
    });
    container.appendChild(selfieVideo);
    await selfieVideo.play();

    frameOverlay = document.createElement("img");
    frameOverlay.src = DATA[index].frame;
    Object.assign(frameOverlay.style, {
      position:"fixed", top:"0", left:"0", width:"100vw", height:"100dvh", 
      objectFit:"fill", pointerEvents:"none", zIndex:"40"
    });
    container.appendChild(frameOverlay);

    frameBitmap = await loadFrameWithTransparency(DATA[index].frame);

    captureBtn.style.display = "block";
    setStatus("タップして撮影");
  }catch(err){
    console.error(err);
    setStatus("カメラを起動できませんでした");
    showHome();
  }
}

async function cleanupSelfie(){
  captureBtn.style.display = "none";
  returnBtn.style.display = "none";
  if(selfieVideo) try{selfieVideo.pause();}catch(e){}
  await stopTracks(selfieStream);
  selfieStream = selfieVideo = frameOverlay = frameBitmap = null;
}

/* ---------- FOTO ---------- */
async function takePhoto(){
  if(mode !== "selfie" || !selfieVideo) return;

  captureBtn.style.transform = "translateX(-50%) scale(0.85)";
  flash();

  try{
    const w = selfieVideo.videoWidth || 1280;
    const h = selfieVideo.videoHeight || 720;

    const canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext("2d");

    ctx.drawImage(selfieVideo, 0, 0, w, h);
    if(frameBitmap) ctx.drawImage(frameBitmap, 0, 0, w, h);

    const dataUrl = canvas.toDataURL("image/jpeg", 0.92);
    const fileName = safeName(DATA[currentIndex].name) + "_" + Date.now() + ".jpg";

    const blob = await fetch(dataUrl).then(r => r.blob());
    const file = new File([blob], fileName, { type: "image/jpeg" });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: DATA[currentIndex].name });
      } catch (e) {
        downloadFile(dataUrl, fileName);
      }
    } else {
      downloadFile(dataUrl, fileName);
    }

    setStatus("保存完了！\n写真をダウンロードしました");

  } catch(err){
    console.error(err);
    setStatus("保存に失敗しました");
  }

  // Mostra botão de retorno
  setTimeout(() => {
    returnBtn.style.display = "block";
    captureBtn.style.transform = "translateX(-50%) scale(1)";
  }, 600);
}

/* ---------- Voltar ao escaneamento ---------- */
function returnToScan(){
  cleanupSelfie();
  showHome();
}

/* ---------- Resize ---------- */
window.addEventListener("resize", () => {
  if(renderer) renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
