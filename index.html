<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AR Test</title>

<script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
<script src="https://unpkg.com/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;}
#ar{position:fixed;inset:0;}
#msg{
position:fixed;top:20px;left:0;width:100%;
text-align:center;color:#fff;font-size:20px;z-index:10;
}
button{
position:fixed;bottom:30px;left:50%;
transform:translateX(-50%);
z-index:10;padding:14px 24px;font-size:18px;
}
</style>
</head>
<body>

<div id="ar"></div>
<div id="msg">Tap START</div>
<button onclick="startAR()">START</button>

<script>
async function startAR(){

document.querySelector("button").style.display="none";
document.getElementById("msg").innerHTML="Opening camera...";

try{

const mindarThree = new window.MINDAR.IMAGE.MindARThree({
container: document.querySelector("#ar"),
imageTargetSrc:"./targets.mind",
uiScanning:false,
uiLoading:false,
uiError:false,
maxTrack:1
});

const {renderer, scene, camera} = mindarThree;

const light = new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

for(let i=0;i<7;i++){

const anchor = mindarThree.addAnchor(i);

anchor.onTargetFound = ()=>{
document.getElementById("msg").innerHTML =
"Marker detectado: " + i;
};

anchor.onTargetLost = ()=>{
document.getElementById("msg").innerHTML =
"Apontando câmera...";
};

}

await mindarThree.start();

document.getElementById("msg").innerHTML="Apontando câmera...";

renderer.setAnimationLoop(()=>{
renderer.render(scene,camera);
});

}catch(err){

document.getElementById("msg").innerHTML =
"Erro: " + err.message;

console.error(err);
}
}
</script>
</body>
</html>
