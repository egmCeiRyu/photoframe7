<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>AR 7 Photo Frames</title>

<script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
<script src="https://unpkg.com/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:sans-serif;
}

#app,#ar-container{
position:fixed;
inset:0;
width:100%;
height:100%;
}

#title{
position:fixed;
top:12px;
left:0;
width:100%;
text-align:center;
color:#fff;
font-size:22px;
font-weight:bold;
z-index:30;
text-shadow:0 2px 8px rgba(0,0,0,.7);
pointer-events:none;
}

#status{
position:fixed;
top:46px;
left:0;
width:100%;
text-align:center;
color:#fff;
font-size:14px;
z-index:30;
text-shadow:0 2px 8px rgba(0,0,0,.7);
pointer-events:none;
padding:0 10px;
box-sizing:border-box;
}

#captureBtn{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
z-index:40;
border:none;
border-radius:16px;
padding:15px 28px;
font-size:20px;
font-weight:bold;
background:#ff5ca9;
color:#fff;
display:none;
}

#flash{
position:fixed;
inset:0;
background:#fff;
opacity:0;
pointer-events:none;
z-index:100;
}
</style>
</head>

<body>

<div id="app">
<div id="ar-container"></div>

<div id="title">AR Photo Frame</div>
<div id="status">Opening camera...</div>

<button id="captureBtn">📸 PHOTO</button>

<div id="flash"></div>
</div>

<script>
let mindarThree;
let renderer, scene, camera;

let currentIndex = -1;
let currentStream = null;
let selfieVideo = null;
let overlay = null;

const statusEl = document.getElementById("status");
const captureBtn = document.getElementById("captureBtn");
const container = document.getElementById("ar-container");

const frames = [
"./samurai-frame1.png",
"./ninja-frame2.png",
"./idol-frame3.png",
"./mecha-frame4.png",
"./kitsune-frame5.png",
"./dragon-frame6.png",
"./water-frame7.png"
];

window.addEventListener("load", startScanner);
captureBtn.addEventListener("click", takePhoto);

function setStatus(txt){
statusEl.innerHTML = txt;
}

async function stopCurrentStream(){
if(currentStream){
currentStream.getTracks().forEach(t=>t.stop());
currentStream = null;
}
}

async function startScanner(){

try{

setStatus("Opening rear camera...");

mindarThree = new window.MINDAR.IMAGE.MindARThree({
container: container,
imageTargetSrc:"./targets.mind",
uiScanning:false,
uiLoading:false,
uiError:false,
maxTrack:1
});

renderer = mindarThree.renderer;
scene = mindarThree.scene;
camera = mindarThree.camera;

renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.preserveDrawingBuffer = true;

const light = new THREE.HemisphereLight(0xffffff,0xbbbbff,1.2);
scene.add(light);

for(let i=0;i<7;i++){

const anchor = mindarThree.addAnchor(i);

anchor.onTargetFound = ()=>{

if(currentIndex !== -1) return;

currentIndex = i;
openSelfie(i);

};

}

await mindarThree.start();

setStatus("Point camera to marker");

renderer.setAnimationLoop(()=>{
renderer.render(scene,camera);
});

}catch(err){

console.error(err);
setStatus("Camera failed. Check HTTPS / Permission");
}
}

async function openSelfie(index){

try{

setStatus("Opening selfie camera...");

if(mindarThree){
await mindarThree.stop();
}

container.innerHTML = "";

await stopCurrentStream();

currentStream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:{ideal:"user"},
width:{ideal:1280},
height:{ideal:720}
},
audio:false
});

selfieVideo = document.createElement("video");
selfieVideo.autoplay = true;
selfieVideo.muted = true;
selfieVideo.playsInline = true;
selfieVideo.srcObject = currentStream;

selfieVideo.style.position="fixed";
selfieVideo.style.inset="0";
selfieVideo.style.width="100%";
selfieVideo.style.height="100%";
selfieVideo.style.objectFit="cover";

container.appendChild(selfieVideo);

await selfieVideo.play();

overlay = document.createElement("img");
overlay.src = frames[index];

overlay.style.position="fixed";
overlay.style.inset="0";
overlay.style.width="100%";
overlay.style.height="100%";
overlay.style.objectFit="cover";
overlay.style.pointerEvents="none";

container.appendChild(overlay);

captureBtn.style.display = "block";
setStatus("Selfie mode ready");

}catch(err){

console.error(err);
setStatus("Selfie camera failed");
}
}

function flashEffect(){

const flash = document.getElementById("flash");

flash.style.transition = "none";
flash.style.opacity = "0.95";

setTimeout(()=>{
flash.style.transition = "opacity .35s ease";
flash.style.opacity = "0";
},40);
}

function takePhoto(){

if(!selfieVideo) return;

flashEffect();

const canvas = document.createElement("canvas");
canvas.width = selfieVideo.videoWidth || 1280;
canvas.height = selfieVideo.videoHeight || 720;

const ctx = canvas.getContext("2d");

ctx.drawImage(selfieVideo,0,0,canvas.width,canvas.height);

if(overlay){
ctx.drawImage(overlay,0,0,canvas.width,canvas.height);
}

const link = document.createElement("a");
link.download = "AR-Photo-"+Date.now()+".jpg";
link.href = canvas.toDataURL("image/jpeg",0.95);
link.click();
}

window.addEventListener("resize",()=>{
if(renderer){
renderer.setSize(window.innerWidth,window.innerHeight);
}
});
</script>

</body>
</html>
