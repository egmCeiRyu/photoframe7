<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>ARフォトフレーム</title>
<script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
<script src="https://unpkg.com/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>
<style>
html,body{
margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
#ar-container{position:fixed;inset:0;background:#000;}
#home{
position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:18px;padding:24px;background:#000;z-index:60;
}
#homeTitle{color:#fff;font-size:30px;font-weight:700;text-align:center;}
#homeSub{color:#fff;font-size:15px;text-align:center;line-height:1.45;max-width:320px;opacity:.92;}
#scanBtn,#captureBtn{
border:none;border-radius:18px;padding:16px 28px;font-size:20px;font-weight:700;background:#ff5ca9;color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.25);
}
#captureBtn{
position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:80;display:none;
}
#title{
position:fixed;top:12px;left:0;width:100%;text-align:center;color:#fff;font-size:22px;font-weight:700;z-index:30;
text-shadow:0 2px 8px rgba(0,0,0,.7);pointer-events:none;
}
#status{
position:fixed;top:46px;left:0;width:100%;text-align:center;color:#fff;font-size:14px;z-index:30;
text-shadow:0 2px 8px rgba(0,0,0,.7);padding:0 12px;box-sizing:border-box;pointer-events:none;
white-space: pre-line; line-height:1.4;
}
#flash{
position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:100;
}
#shareBtn{
position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:90;
padding:14px 28px;font-size:17px;font-weight:600;background:#34c759;color:#fff;
border:none;border-radius:14px;box-shadow:0 6px 20px rgba(0,0,0,.3);display:none;
}
</style>
</head>
<body>
<div id="ar-container"></div>
<div id="title">ARフォトフレーム</div>
<div id="status">準備完了</div>

<div id="home">
  <div id="homeTitle">ARフォトフレーム</div>
  <div id="homeSub">下のボタンを押してARマーカーをスキャンしてください。</div>
  <button id="scanBtn">ARマーカーをスキャン</button>
</div>

<button id="captureBtn">📸 撮影</button>
<button id="shareBtn">📤 もう一度共有する</button>
<div id="flash"></div>

<script>
/* ---------- CONFIG ---------- */
const DATA = [
  {frame:"./samurai-frame1.png", name:"Samurai"},
  {frame:"./ninja-frame2.png", name:"Shadow-Ninja"},
  {frame:"./idol-frame3.png", name:"Sakura-Idol"},
  {frame:"./mecha-frame4.png", name:"Mecha-Bot"},
  {frame:"./kitsune-frame5.png", name:"Kitsune-Spirit"},
  {frame:"./dragon-frame6.png", name:"Dragon-Knight"},
  {frame:"./water-frame7.png", name:"Water-Mage"}
];
const TARGETS_FILE = "./targets.mind";

/* ---------------------------- */
const container = document.getElementById("ar-container");
const statusEl = document.getElementById("status");
const home = document.getElementById("home");
const scanBtn = document.getElementById("scanBtn");
const captureBtn = document.getElementById("captureBtn");
const shareBtn = document.getElementById("shareBtn");

let mode = "home";
let busy = false;
let currentIndex = -1;
let mindarThree = null;
let renderer = null;
let scene = null;
let camera = null;
let selfieStream = null;
let selfieVideo = null;
let frameOverlay = null;
let frameBitmap = null;
let lastDataUrl = null;
let lastFileName = null;

scanBtn.addEventListener("click", startScanner);
captureBtn.addEventListener("click", takePhoto);
shareBtn.addEventListener("click", shareLastPhoto);

/* ---------- HELPERS ---------- */
function setStatus(t){ statusEl.textContent = t; }

function showHome(){
  home.style.display = "flex";
  captureBtn.style.display = "none";
  shareBtn.style.display = "none";
  mode = "home";
  setStatus("準備完了");
}

function hideHome(){ home.style.display = "none"; }

function flash(){
  const el = document.getElementById("flash");
  el.style.transition = "none";
  el.style.opacity = "0.95";
  setTimeout(() => { el.style.transition = "opacity .35s ease"; el.style.opacity = "0"; }, 40);
}

function clearContainer(){ container.innerHTML = ""; }

async function stopTracks(stream){
  if(stream) stream.getTracks().forEach(t => t.stop());
}

function safeName(name){ return name.replace(/[^\w\-]/g, ""); }

function downloadFile(dataUrl, fileName){
  const a = document.createElement("a");
  a.href = dataUrl;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

async function loadFrameWithTransparency(src){
  const response = await fetch(src);
  const blob = await response.blob();
  return await createImageBitmap(blob);
}

/* ---------- SCANNER ---------- */
async function startScanner(){
  hideHome();
  mode = "scanner";
  busy = false;
  currentIndex = -1;
  await cleanupSelfie();
  await cleanupScanner();
  clearContainer();

  try{
    setStatus("背面カメラを起動しています...");
    mindarThree = new window.MINDAR.IMAGE.MindARThree({
      container: container,
      imageTargetSrc: TARGETS_FILE,
      uiScanning: false,
      uiLoading: false,
      uiError: false,
      maxTrack: 1
    });

    renderer = mindarThree.renderer;
    scene = mindarThree.scene;
    camera = mindarThree.camera;

    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1.1));

    for(let i = 0; i < 7; i++){
      const anchor = mindarThree.addAnchor(i);
      anchor.onTargetFound = () => {
        if(mode !== "scanner" || busy) return;
        busy = true;
        currentIndex = i;
        setTimeout(() => openSelfie(i), 220);
      };
    }

    await mindarThree.start();
    renderer.setAnimationLoop(() => renderer.render(scene, camera));
    setStatus("ARマーカーをカメラに映してください");
  }catch(err){
    console.error(err);
    setStatus("カメラを起動できませんでした");
    showHome();
  }
}

async function cleanupScanner(){
  try{ if(mindarThree) await mindarThree.stop(); }catch(e){}
  try{ if(renderer) renderer.setAnimationLoop(null); }catch(e){}
  mindarThree = renderer = scene = camera = null;
}

/* ---------- SELFIE ---------- */
async function openSelfie(index){
  mode = "selfie";
  await cleanupScanner();
  clearContainer();

  try{
    setStatus("前面カメラを起動しています...");
    selfieStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "user" }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });

    selfieVideo = document.createElement("video");
    selfieVideo.autoplay = true;
    selfieVideo.muted = true;
    selfieVideo.playsInline = true;
    selfieVideo.srcObject = selfieStream;
    Object.assign(selfieVideo.style, {position:"fixed",top:"0",left:"0",width:"100vw",height:"100dvh",objectFit:"cover"});
    container.appendChild(selfieVideo);
    await selfieVideo.play();

    frameOverlay = document.createElement("img");
    frameOverlay.src = DATA[index].frame;
    Object.assign(frameOverlay.style, {position:"fixed",top:"0",left:"0",width:"100vw",height:"100dvh",objectFit:"fill",pointerEvents:"none",zIndex:"40"});
    container.appendChild(frameOverlay);

    frameBitmap = await loadFrameWithTransparency(DATA[index].frame);

    captureBtn.style.display = "block";
    setStatus("準備完了\n画面をタップして撮影してください");
  }catch(err){
    console.error(err);
    setStatus("前面カメラを起動できませんでした");
    showHome();
  }
}

async function cleanupSelfie(){
  captureBtn.style.display = "none";
  shareBtn.style.display = "none";
  if(selfieVideo) try{selfieVideo.pause();}catch(e){}
  await stopTracks(selfieStream);
  selfieStream = selfieVideo = frameOverlay = frameBitmap = null;
  lastDataUrl = null;
  lastFileName = null;
}

/* ---------- FOTO ---------- */
async function takePhoto(){
  if(mode !== "selfie" || !selfieVideo) return;

  captureBtn.disabled = true;
  flash();

  try{
    const w = selfieVideo.videoWidth || 1280;
    const h = selfieVideo.videoHeight || 720;

    const canvas = document.createElement("canvas");
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext("2d");

    ctx.drawImage(selfieVideo, 0, 0, w, h);
    if(frameBitmap) ctx.drawImage(frameBitmap, 0, 0, w, h);

    lastDataUrl = canvas.toDataURL("image/jpeg", 0.92);
    lastFileName = safeName(DATA[currentIndex].name) + "_" + Date.now() + ".jpg";

    const blob = await fetch(lastDataUrl).then(r => r.blob());
    const file = new File([blob], lastFileName, { type: "image/jpeg" });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: DATA[currentIndex].name,
        text: "ARフォトフレームで撮影しました！"
      });
      setStatus("共有メニューが開きました\n「写真に保存」を選択してください");
    } else {
      downloadFile(lastDataUrl, lastFileName);
      setStatus("写真をDownloadsに保存しました\n\n写真を開いて「共有」→「写真に保存」をタップしてください");
    }

    shareBtn.style.display = "block";

  } catch(err){
    console.error(err);
    if(lastDataUrl) downloadFile(lastDataUrl, lastFileName);
    setStatus("写真を保存しました\nDownloadsから「写真に保存」してください");
    shareBtn.style.display = "block";
  }

  // ←←← VOLTA AUTOMATICAMENTE PARA O MENU DE ESCANEAR ←←←
  setTimeout(() => {
    cleanupSelfie();
    showHome();
    captureBtn.disabled = false;
  }, 5000);   // 5 segundos (pode mudar para 4000 ou 6000 se quiser)
}

/* ---------- Compartilhar novamente ---------- */
async function shareLastPhoto(){
  if(!lastDataUrl) return;
  try{
    const blob = await fetch(lastDataUrl).then(r => r.blob());
    const file = new File([blob], lastFileName, { type: "image/jpeg" });
    await navigator.share({ files: [file], title: DATA[currentIndex]?.name || "AR Photo" });
  } catch(e){
    if(lastDataUrl) downloadFile(lastDataUrl, lastFileName);
  }
}

/* ---------- Resize ---------- */
window.addEventListener("resize", () => {
  if(renderer) renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
