<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>AR Anime Mascot Photo Frame</title>

<script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
<script src="https://unpkg.com/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

#ar-container{
position:fixed;
inset:0;
width:100%;
height:100%;
overflow:hidden;
}

#title{
position:fixed;
top:14px;
left:0;
width:100%;
text-align:center;
color:#fff;
font-size:22px;
font-weight:700;
z-index:20;
text-shadow:0 2px 8px rgba(0,0,0,.7);
pointer-events:none;
}

#guide{
position:fixed;
bottom:95px;
left:0;
width:100%;
text-align:center;
color:#fff;
font-size:15px;
z-index:20;
text-shadow:0 2px 8px rgba(0,0,0,.7);
pointer-events:none;
}

#captureBtn{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
z-index:20;
border:none;
border-radius:16px;
padding:15px 30px;
font-size:20px;
font-weight:700;
color:#fff;
background:linear-gradient(135deg,#ff5ca9,#ff84d2);
box-shadow:0 8px 20px rgba(0,0,0,.28);
}

#loading{
position:fixed;
inset:0;
background:#000;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
z-index:99;
font-size:18px;
text-align:center;
padding:20px;
}

#flash{
position:fixed;
inset:0;
background:#fff;
opacity:0;
pointer-events:none;
z-index:200;
}
</style>
</head>

<body>

<div id="ar-container"></div>

<div id="loading">Opening Camera...</div>
<div id="flash"></div>

<div id="title">AR Anime Mascot Photo Frame</div>
<div id="guide">マーカーをカメラに映してください</div>

<button id="captureBtn">📸 撮影</button>

<script>
let renderer, scene, camera, mascot;

window.addEventListener("load", startAR);

async function startAR(){
try{

const mindarThree = new window.MINDAR.IMAGE.MindARThree({
container: document.querySelector("#ar-container"),
imageTargetSrc:"./targets.mind",
uiScanning:false,
uiLoading:false,
uiError:false
});

renderer = mindarThree.renderer;
scene = mindarThree.scene;
camera = mindarThree.camera;

renderer.preserveDrawingBuffer = true;
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);

const light = new THREE.HemisphereLight(0xffffff,0xbbbbff,1.2);
scene.add(light);

const loader = new THREE.TextureLoader();
const texture = await loader.loadAsync("./anime-mascot.png");

texture.encoding = THREE.sRGBEncoding;

const material = new THREE.MeshBasicMaterial({
map:texture,
transparent:true,
alphaTest:0.35,
side:THREE.DoubleSide
});

mascot = new THREE.Mesh(
new THREE.PlaneGeometry(1.1,2.4),
material
);

mascot.position.set(0,1.15,0);

const anchor = mindarThree.addAnchor(0);
anchor.group.add(mascot);

await mindarThree.start();

document.getElementById("loading").style.display = "none";

renderer.setAnimationLoop(()=>{

if(mascot){
mascot.lookAt(camera.position);
}

renderer.render(scene,camera);

});

}catch(error){

document.getElementById("loading").innerHTML =
"Failed to start AR.<br>Check camera permission.";

console.error(error);

}
}

function flashEffect(){
const flash = document.getElementById("flash");
flash.style.transition = "none";
flash.style.opacity = "0.95";

setTimeout(()=>{
flash.style.transition = "opacity .35s ease";
flash.style.opacity = "0";
},40);
}

function isIOS(){
return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
(navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
}

function dataURLtoFile(dataurl, filename){
const arr = dataurl.split(',');
const mime = arr[0].match(/:(.*?);/)[1];
const bstr = atob(arr[1]);
let n = bstr.length;
const u8arr = new Uint8Array(n);

while(n--){
u8arr[n] = bstr.charCodeAt(n);
}

return new File([u8arr], filename, {type:mime});
}

async function saveImage(dataUrl){

/* iPhone / iPad */
if(isIOS() && navigator.canShare && navigator.share){

try{
const file = dataURLtoFile(dataUrl,"ar-photo.jpg");

if(navigator.canShare({files:[file]})){
await navigator.share({
files:[file],
title:"AR Photo",
text:"Save Photo"
});
return;
}
}catch(e){}
}

/* fallback Android/Desktop */
const link = document.createElement("a");
link.download = "ar-photo.jpg";
link.href = dataUrl;
link.click();
}

async function takePhoto(){

flashEffect();

renderer.render(scene,camera);

const glCanvas = renderer.domElement;
const video = document.querySelector("video");

if(!glCanvas || !video) return;

const output = document.createElement("canvas");
output.width = glCanvas.width;
output.height = glCanvas.height;

const ctx = output.getContext("2d");

ctx.drawImage(video,0,0,output.width,output.height);
ctx.drawImage(glCanvas,0,0,output.width,output.height);

const dataUrl = output.toDataURL("image/jpeg",0.95);

await saveImage(dataUrl);
}

document.getElementById("captureBtn").addEventListener("click", takePhoto);

window.addEventListener("resize",()=>{
if(renderer){
renderer.setSize(window.innerWidth,window.innerHeight);
}
});
</script>

</body>
</html>
