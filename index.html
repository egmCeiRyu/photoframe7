<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>ARフォトフレーム</title>
<script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
<script src="https://unpkg.com/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>
<style>
:root {
  --accent: #4cc9f0;
}

html, body {
  margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

#ar-container { position: fixed; inset: 0; background: #000; }

/* Status */
#status {
  position: fixed;
  top: 65px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  font-size: 15.5px;
  line-height: 1.5;
  z-index: 50;
  text-shadow: 0 2px 10px rgba(0,0,0,0.9);
  white-space: pre-line;
}

/* Home Screen */
#home {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 32px;
  background: rgba(0,0,0,0.75);
  z-index: 60;
}

#homeTitle {
  font-size: 42px;
  font-weight: 800;
  background: linear-gradient(90deg, #ff2e9a, #9b4dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
  letter-spacing: 1px;
}

#homeSub {
  font-size: 17px;
  max-width: 290px;
  text-align: center;
  opacity: 0.9;
  line-height: 1.6;
}

/* Bottom Bar */
.bottom-bar {
  position: fixed;
  bottom: 35px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 70px;
  z-index: 90;
  align-items: center;
}

.btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: white;
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
}

.btn:active { transform: scale(0.92); }

.btn-circle {
  width: 68px;
  height: 68px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(255,255,255,0.35);
}

#captureBtn .btn-circle {
  width: 82px;
  height: 82px;
  background: var(--accent);
  border: none;
  box-shadow: 0 0 35px rgba(76, 201, 240, 0.85);
  font-size: 38px;
}

/* Flash */
#flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  z-index: 100;
  transition: opacity 0.35s ease;
}
</style>
</head>
<body>
<div id="ar-container"></div>
<div id="status">準備完了</div>

<div id="home">
  <div id="homeTitle">ARフォトフレーム</div>
  <div id="homeSub">ARマーカーをスキャンして<br>自分だけの特別な写真を撮ろう</div>
  <button id="scanBtn">ARマーカーをスキャン</button>
</div>

<!-- Bottom Bar -->
<div class="bottom-bar" id="bottomBar" style="display:none;">
  <div class="btn" id="returnBtn">
    <div class="btn-circle">↺</div>
    <div>RETORNAR</div>
  </div>
  
  <div class="btn" id="captureBtn">
    <div class="btn-circle">📸</div>
    <div>TIRAR FOTO</div>
  </div>
</div>

<div id="flash"></div>

<script>
/* ---------- CONFIG ---------- */
const DATA = [
  {frame:"./samurai-frame1.png", name:"Samurai"},
  {frame:"./ninja-frame2.png", name:"Shadow-Ninja"},
  {frame:"./idol-frame3.png", name:"Sakura-Idol"},
  {frame:"./mecha-frame4.png", name:"Mecha-Bot"},
  {frame:"./kitsune-frame5.png", name:"Kitsune-Spirit"},
  {frame:"./dragon-frame6.png", name:"Dragon-Knight"},
  {frame:"./water-frame7.png", name:"Water-Mage"}
];
const TARGETS_FILE = "./targets.mind";

/* Elements */
const container = document.getElementById("ar-container");
const statusEl = document.getElementById("status");
const home = document.getElementById("home");
const scanBtn = document.getElementById("scanBtn");
const bottomBar = document.getElementById("bottomBar");
const captureBtn = document.getElementById("captureBtn");
const returnBtn = document.getElementById("returnBtn");

let mode = "home";
let busy = false;
let currentIndex = -1;
let mindarThree = null;
let renderer = null;
let scene = null;
let camera = null;
let selfieStream = null;
let selfieVideo = null;
let frameOverlay = null;
let frameBitmap = null;

scanBtn.addEventListener("click", startScanner);
captureBtn.addEventListener("click", takePhoto);
returnBtn.addEventListener("click", returnToScan);

/* ---------- HELPERS ---------- */
function setStatus(t){ statusEl.textContent = t; }

function showHome(){
  home.style.display = "flex";
  bottomBar.style.display = "none";
  mode = "home";
  setStatus("準備完了");
}

function hideHome(){ home.style.display = "none"; }

function flash(){
  const el = document.getElementById("flash");
  el.style.transition = "none";
  el.style.opacity = "0.92";
  setTimeout(() => { el.style.transition = "opacity 0.35s ease"; el.style.opacity = "0"; }, 50);
}

function clearContainer(){ container.innerHTML = ""; }

async function stopTracks(stream){
  if(stream) stream.getTracks().forEach(t => t.stop());
}

function safeName(name){ return name.replace(/[^\w\-]/g, ""); }

function downloadFile(dataUrl, fileName){
  const a = document.createElement("a");
  a.href = dataUrl;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

async function loadFrameWithTransparency(src){
  const response = await fetch(src);
  const blob = await response.blob();
  return await createImageBitmap(blob);
}

/* ---------- SCANNER ---------- */
async function startScanner(){
  hideHome();
  mode = "scanner";
  busy = false;
  currentIndex = -1;
  await cleanupSelfie();
  await cleanupScanner();
  clearContainer();

  try{
    setStatus("背面カメラを起動しています...");
    mindarThree = new window.MINDAR.IMAGE.MindARThree({
      container: container,
      imageTargetSrc: TARGETS_FILE,
      uiScanning: false,
      uiLoading: false,
      uiError: false,
      maxTrack: 1
    });

    renderer = mindarThree.renderer;
    scene = mindarThree.scene;
    camera = mindarThree.camera;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1.1));

    for(let i = 0; i < 7; i++){
      const anchor = mindarThree.addAnchor(i);
      anchor.onTargetFound = () => {
        if(mode !== "scanner" || busy) return;
        busy = true;
        currentIndex = i;
        setTimeout(() => openSelfie(i), 250);
      };
    }

    await mindarThree.start();
    renderer.setAnimationLoop(() => renderer.render(scene, camera));
    setStatus("ARマーカーをカメラに映してください");
  }catch(err){
    console.error(err);
    setStatus("カメラを起動できませんでした");
    showHome();
  }
}

async function cleanupScanner(){
  try{ if(mindarThree) await mindarThree.stop(); }catch(e){}
  try{ if(renderer) renderer.setAnimationLoop(null); }catch(e){}
  mindarThree = renderer = scene = camera = null;
}

/* ---------- SELFIE ---------- */
async function openSelfie(index){
  mode = "selfie";
  await cleanupScanner();
  clearContainer();

  try{
    setStatus("前面カメラを起動しています...");
    selfieStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "user" }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });

    selfieVideo = document.createElement("video");
    selfieVideo.autoplay = true;
    selfieVideo.muted = true;
    selfieVideo.playsInline = true;
    selfieVideo.srcObject = selfieStream;
    Object.assign(selfieVideo.style, {position:"fixed",top:"0",left:"0",width:"100vw",height:"100dvh",objectFit:"cover"});
    container.appendChild(selfieVideo);
    await selfieVideo.play();

    frameOverlay = document.createElement("img");
    frameOverlay.src = DATA[index].frame;
    Object.assign(frameOverlay.style, {position:"fixed",top:"0",left:"0",width:"100vw",height:"100dvh",objectFit:"fill",pointerEvents:"none",zIndex:"40"});
    container.appendChild(frameOverlay);

    frameBitmap = await loadFrameWithTransparency(DATA[index].frame);

    bottomBar.style.display = "flex";
    setStatus("タップして撮影してください");
  }catch(err){
    console.error(err);
    setStatus("前面カメラを起動できませんでした");
    showHome();
  }
}

async function cleanupSelfie(){
  bottomBar.style.display = "none";
  if(selfieVideo) try{selfieVideo.pause();}catch(e){}
  await stopTracks(selfieStream);
  selfieStream = selfieVideo = frameOverlay = frameBitmap = null;
}

/* ---------- TAKE PHOTO ---------- */
async function takePhoto(){
  if(mode !== "selfie" || !selfieVideo) return;

  flash();

  try{
    const w = selfieVideo.videoWidth || 1280;
    const h = selfieVideo.videoHeight || 720;

    const canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext("2d");

    ctx.drawImage(selfieVideo, 0, 0, w, h);
    if(frameBitmap) ctx.drawImage(frameBitmap, 0, 0, w, h);

    const dataUrl = canvas.toDataURL("image/jpeg", 0.92);
    const fileName = safeName(DATA[currentIndex].name) + "_" + Date.now() + ".jpg";

    downloadFile(dataUrl, fileName);
    setStatus("✅ 写真を保存しました！");

  } catch(err){
    console.error(err);
    setStatus("保存に失敗しました");
  }
}

/* ---------- RETURN TO SCAN ---------- */
function returnToScan(){
  cleanupSelfie();
  showHome();
}

/* ---------- Resize ---------- */
window.addEventListener("resize", () => {
  if(renderer) renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
