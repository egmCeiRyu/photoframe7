<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>AR Photo Frame Auto</title>

<script src="https://unpkg.com/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:sans-serif;
}

#ar-container{
position:fixed;
inset:0;
width:100%;
height:100%;
}

#title{
position:fixed;
top:10px;
left:0;
width:100%;
text-align:center;
color:#fff;
font-size:20px;
font-weight:bold;
z-index:20;
text-shadow:0 2px 8px rgba(0,0,0,.7);
pointer-events:none;
}

#guide{
position:fixed;
top:40px;
left:0;
width:100%;
text-align:center;
color:#fff;
font-size:14px;
z-index:20;
text-shadow:0 2px 8px rgba(0,0,0,.7);
pointer-events:none;
}

#captureBtn{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
z-index:30;
border:none;
border-radius:16px;
padding:16px 34px;
font-size:20px;
font-weight:bold;
background:#ff5ca9;
color:#fff;
box-shadow:0 8px 20px rgba(0,0,0,.28);
}

#loading{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
z-index:100;
font-size:18px;
}

#flash{
position:fixed;
inset:0;
background:#fff;
opacity:0;
pointer-events:none;
z-index:200;
}
</style>
</head>

<body>

<div id="ar-container"></div>
<div id="loading">Opening Camera...</div>
<div id="flash"></div>

<div id="title">AR Photo Frame</div>
<div id="guide">マーカーをカメラに映してください</div>

<button id="captureBtn">📸 撮影</button>

<script>
let renderer, scene, camera;
let frameMesh;
let currentIndex = -1;

const frames = [
"./samurai-frame1.png",
"./ninja-frame2.png",
"./idol-frame3.png",
"./mecha-frame4.png",
"./kitsune-frame5.png",
"./dragon-frame6.png",
"./water-frame7.png"
];

window.addEventListener("load", startAR);

async function startAR(){

try{

const mindarThree = new window.MINDAR.IMAGE.MindARThree({
container: document.querySelector("#ar-container"),
imageTargetSrc:"./targets.mind",
uiScanning:false,
uiLoading:false,
uiError:false
});

renderer = mindarThree.renderer;
scene = mindarThree.scene;
camera = mindarThree.camera;

renderer.preserveDrawingBuffer = true;
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);

const light = new THREE.HemisphereLight(0xffffff,0xbbbbff,1.2);
scene.add(light);

frameMesh = new THREE.Mesh(
new THREE.PlaneGeometry(1.7,3.0),
new THREE.MeshBasicMaterial({
transparent:true,
side:THREE.DoubleSide
})
);

scene.add(frameMesh);
frameMesh.visible = false;

for(let i=0;i<7;i++){

const anchor = mindarThree.addAnchor(i);

anchor.onTargetFound = async ()=>{

currentIndex = i;
await loadFrame(i);

frameMesh.visible = true;
frameMesh.position.copy(anchor.group.position);
frameMesh.quaternion.copy(anchor.group.quaternion);

};

anchor.onTargetLost = ()=>{
frameMesh.visible = false;
};

}

await mindarThree.start();

document.getElementById("loading").style.display="none";

renderer.setAnimationLoop(()=>{

renderer.render(scene,camera);

});

}catch(err){

console.error(err);
document.getElementById("loading").innerHTML="Camera failed.";

}

}

async function loadFrame(index){

const loader = new THREE.TextureLoader();
const tex = await loader.loadAsync(frames[index]);
tex.encoding = THREE.sRGBEncoding;

frameMesh.material.map = tex;
frameMesh.material.needsUpdate = true;
}

function flashEffect(){

const flash = document.getElementById("flash");

flash.style.transition="none";
flash.style.opacity="0.95";

setTimeout(()=>{
flash.style.transition="opacity .35s ease";
flash.style.opacity="0";
},40);
}

function takePhoto(){

flashEffect();

renderer.render(scene,camera);

const glCanvas = renderer.domElement;
const video = document.querySelector("video");

if(!video || !glCanvas) return;

const output = document.createElement("canvas");
output.width = glCanvas.width;
output.height = glCanvas.height;

const ctx = output.getContext("2d");

ctx.drawImage(video,0,0,output.width,output.height);
ctx.drawImage(glCanvas,0,0,output.width,output.height);

const link = document.createElement("a");
link.download = "AR-Photo-"+Date.now()+".jpg";
link.href = output.toDataURL("image/jpeg",0.95);
link.click();
}

document.getElementById("captureBtn").addEventListener("click",takePhoto);

window.addEventListener("resize",()=>{
if(renderer){
renderer.setSize(window.innerWidth,window.innerHeight);
}
});
</script>

</body>
</html>
