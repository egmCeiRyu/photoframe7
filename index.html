<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>AR 7 Photo Frames</title>

<script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
<script src="https://unpkg.com/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:sans-serif;
}

#ar-container{
position:fixed;
inset:0;
}

#loading{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
color:#fff;
z-index:100;
font-size:18px;
text-align:center;
padding:20px;
}

#captureBtn{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
z-index:30;
border:none;
border-radius:16px;
padding:16px 32px;
font-size:20px;
font-weight:bold;
background:#ff5ca9;
color:#fff;
}

#title{
position:fixed;
top:12px;
left:0;
width:100%;
text-align:center;
color:#fff;
font-size:20px;
font-weight:bold;
z-index:30;
}

#guide{
position:fixed;
top:42px;
left:0;
width:100%;
text-align:center;
color:#fff;
font-size:14px;
z-index:30;
}
</style>
</head>

<body>

<div id="ar-container"></div>
<div id="loading">Opening Camera...</div>
<div id="title">AR Photo Frame</div>
<div id="guide">マーカーをカメラに映してください</div>
<button id="captureBtn">📸 撮影</button>

<script>
let renderer, scene, camera;

window.addEventListener("load", startAR);

async function startAR(){

try{

const mindarThree = new window.MINDAR.IMAGE.MindARThree({
container: document.querySelector("#ar-container"),

/* CORRIGIDO AQUI */
imageTargetSrc:"./samurai.mind",

uiScanning:false,
uiLoading:false,
uiError:false
});

renderer = mindarThree.renderer;
scene = mindarThree.scene;
camera = mindarThree.camera;

renderer.preserveDrawingBuffer = true;
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);

const light = new THREE.HemisphereLight(0xffffff,0xbbbbff,1.2);
scene.add(light);

const texture = await new THREE.TextureLoader().loadAsync("./samurai-frame1.png");
texture.encoding = THREE.sRGBEncoding;

const frame = new THREE.Mesh(
new THREE.PlaneGeometry(1.6,2.8),
new THREE.MeshBasicMaterial({
map:texture,
transparent:true,
side:THREE.DoubleSide
})
);

frame.position.set(0,0.9,0);

const anchor = mindarThree.addAnchor(0);
anchor.group.add(frame);

await mindarThree.start();

document.getElementById("loading").style.display="none";

renderer.setAnimationLoop(()=>{
frame.lookAt(camera.position);
renderer.render(scene,camera);
});

}catch(err){

document.getElementById("loading").innerHTML =
"Failed to start.<br>"+err.message;

console.error(err);
}
}

document.getElementById("captureBtn").addEventListener("click",()=>{

renderer.render(scene,camera);

const glCanvas = renderer.domElement;
const video = document.querySelector("video");

if(!video) return;

const output = document.createElement("canvas");
output.width = glCanvas.width;
output.height = glCanvas.height;

const ctx = output.getContext("2d");

ctx.drawImage(video,0,0,output.width,output.height);
ctx.drawImage(glCanvas,0,0,output.width,output.height);

const link = document.createElement("a");
link.download = "photo.jpg";
link.href = output.toDataURL("image/jpeg",0.95);
link.click();

});

</script>
</body>
</html>
