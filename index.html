<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>AR Photo Frame Booth</title>

<script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
<script src="https://unpkg.com/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

#ar-container{
position:fixed;
inset:0;
width:100%;
height:100%;
background:#000;
}

#home{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:18px;
background:#000;
z-index:60;
padding:24px;
box-sizing:border-box;
}

#homeTitle{
color:#fff;
font-size:30px;
font-weight:700;
text-align:center;
}

#homeSub{
color:#fff;
font-size:15px;
text-align:center;
opacity:.9;
max-width:320px;
line-height:1.45;
}

#scanBtn,
#captureBtn{
border:none;
border-radius:18px;
padding:16px 28px;
font-size:20px;
font-weight:700;
background:#ff5ca9;
color:#fff;
box-shadow:0 8px 24px rgba(0,0,0,.25);
}

#captureBtn{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
z-index:50;
display:none;
}

#title{
position:fixed;
top:12px;
left:0;
width:100%;
text-align:center;
color:#fff;
font-size:22px;
font-weight:700;
z-index:30;
text-shadow:0 2px 8px rgba(0,0,0,.7);
pointer-events:none;
}

#status{
position:fixed;
top:46px;
left:0;
width:100%;
text-align:center;
color:#fff;
font-size:14px;
z-index:30;
text-shadow:0 2px 8px rgba(0,0,0,.7);
padding:0 12px;
box-sizing:border-box;
pointer-events:none;
}

#flash{
position:fixed;
inset:0;
background:#fff;
opacity:0;
pointer-events:none;
z-index:100;
}
</style>
</head>

<body>

<div id="ar-container"></div>

<div id="title">AR Photo Frame</div>
<div id="status">Ready</div>

<div id="home">
<div id="homeTitle">AR Photo Frame</div>
<div id="homeSub">Tap the button below and scan the AR marker to start.</div>
<button id="scanBtn">SCAN THE AR MARKER</button>
</div>

<button id="captureBtn">📸 PHOTO</button>

<div id="flash"></div>

<script>
/* ---------- CONFIG ---------- */
const DATA = [
{frame:"./samurai-frame1.png", name:"Samurai"},
{frame:"./ninja-frame2.png", name:"Shadow-Ninja"},
{frame:"./idol-frame3.png", name:"Sakura-Idol"},
{frame:"./mecha-frame4.png", name:"Mecha-Bot"},
{frame:"./kitsune-frame5.png", name:"Kitsune-Spirit"},
{frame:"./dragon-frame6.png", name:"Dragon-Knight"},
{frame:"./water-frame7.png", name:"Water-Mage"}
];

const TARGETS_FILE = "./targets.mind";
/* ---------------------------- */

const container = document.getElementById("ar-container");
const statusEl = document.getElementById("status");
const captureBtn = document.getElementById("captureBtn");
const scanBtn = document.getElementById("scanBtn");
const home = document.getElementById("home");

let mode = "home";
let busy = false;
let currentIndex = -1;

let mindarThree = null;
let renderer = null;
let scene = null;
let camera = null;

let selfieStream = null;
let selfieVideo = null;
let frameOverlay = null;

scanBtn.addEventListener("click", startScanner);
captureBtn.addEventListener("click", takePhoto);

/* ---------- HELPERS ---------- */

function setStatus(txt){
statusEl.textContent = txt;
}

function flash(){
const el = document.getElementById("flash");
el.style.transition = "none";
el.style.opacity = "0.95";
setTimeout(()=>{
el.style.transition = "opacity .35s ease";
el.style.opacity = "0";
},40);
}

function clearContainer(){
container.innerHTML = "";
}

function showHome(){
home.style.display = "flex";
captureBtn.style.display = "none";
setStatus("Ready");
mode = "home";
}

function hideHome(){
home.style.display = "none";
}

async function stopTracks(stream){
if(stream){
stream.getTracks().forEach(track=>track.stop());
}
}

function downloadFile(dataUrl,fileName){
const link = document.createElement("a");
link.href = dataUrl;
link.download = fileName;
document.body.appendChild(link);
link.click();
link.remove();
}

/* ---------- SCANNER ---------- */

async function startScanner(){

hideHome();

mode = "scanner";
busy = false;
currentIndex = -1;

captureBtn.style.display = "none";

await cleanupSelfie();
await cleanupScanner();

clearContainer();

try{

setStatus("Opening rear camera...");

mindarThree = new window.MINDAR.IMAGE.MindARThree({
container: container,
imageTargetSrc: TARGETS_FILE,
uiScanning:false,
uiLoading:false,
uiError:false,
maxTrack:1
});

renderer = mindarThree.renderer;
scene = mindarThree.scene;
camera = mindarThree.camera;

renderer.preserveDrawingBuffer = true;
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);

const light = new THREE.HemisphereLight(0xffffff,0xbbbbff,1.15);
scene.add(light);

for(let i=0;i<7;i++){

const anchor = mindarThree.addAnchor(i);

anchor.onTargetFound = ()=>{

if(mode !== "scanner") return;
if(busy) return;

busy = true;
currentIndex = i;

setTimeout(()=>{
openSelfie(i);
},250);

};

}

await mindarThree.start();

renderer.setAnimationLoop(()=>{
renderer.render(scene,camera);
});

setStatus("Point camera to marker");

}catch(err){

console.error(err);
setStatus("Camera failed");
showHome();

}
}

async function cleanupScanner(){

try{
if(mindarThree){
await mindarThree.stop();
}
}catch(e){}

try{
if(renderer){
renderer.setAnimationLoop(null);
}
}catch(e){}

mindarThree = null;
renderer = null;
scene = null;
camera = null;
}

/* ---------- SELFIE ---------- */

async function openSelfie(index){

mode = "selfie";

await cleanupScanner();
clearContainer();

try{

setStatus("Opening selfie camera...");

selfieStream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:{ideal:"user"},
width:{ideal:1280},
height:{ideal:720}
},
audio:false
});

selfieVideo = document.createElement("video");
selfieVideo.autoplay = true;
selfieVideo.muted = true;
selfieVideo.playsInline = true;
selfieVideo.srcObject = selfieStream;

Object.assign(selfieVideo.style,{
position:"fixed",
top:"0",
left:"0",
width:"100vw",
height:"100dvh",
objectFit:"cover"
});

container.appendChild(selfieVideo);

await selfieVideo.play();

frameOverlay = document.createElement("img");
frameOverlay.src = DATA[index].frame;

/* force alpha transparency correctly */
frameOverlay.onload = ()=>{
frameOverlay.style.opacity = "1";
};

Object.assign(frameOverlay.style,{
position:"fixed",
top:"0",
left:"0",
width:"100vw",
height:"100dvh",
objectFit:"fill",
pointerEvents:"none",
zIndex:"20",
background:"transparent",
mixBlendMode:"normal",
imageRendering:"auto"
});

container.appendChild(frameOverlay);

captureBtn.style.display = "block";
setStatus("Selfie mode ready");

}catch(err){

console.error(err);
setStatus("Selfie camera failed");
showHome();

}
}

async function cleanupSelfie(){

captureBtn.style.display = "none";

if(selfieVideo){
try{ selfieVideo.pause(); }catch(e){}
}

await stopTracks(selfieStream);

selfieStream = null;
selfieVideo = null;

if(frameOverlay){
frameOverlay.remove();
}
frameOverlay = null;
}

/* ---------- PHOTO ---------- */

async function takePhoto(){

if(mode !== "selfie") return;
if(!selfieVideo) return;

captureBtn.disabled = true;

flash();

try{

const w = selfieVideo.videoWidth || 1280;
const h = selfieVideo.videoHeight || 720;

const canvas = document.createElement("canvas");
canvas.width = w;
canvas.height = h;

const ctx = canvas.getContext("2d");

ctx.clearRect(0,0,w,h);
ctx.drawImage(selfieVideo,0,0,w,h);

if(frameOverlay){
ctx.drawImage(frameOverlay,0,0,w,h);
}

const dataUrl = canvas.toDataURL("image/jpeg",0.95);

const fileName =
DATA[currentIndex].name + "-" + Date.now() + ".jpg";

downloadFile(dataUrl,fileName);

setStatus("Saved!");

}catch(err){

console.error(err);
setStatus("Save failed");

}

setTimeout(async ()=>{
captureBtn.disabled = false;
await cleanupSelfie();
showHome();
},900);

}

/* ---------- RESIZE ---------- */

window.addEventListener("resize",()=>{
if(renderer){
renderer.setSize(window.innerWidth,window.innerHeight);
}
});
</script>

</body>
</html>
